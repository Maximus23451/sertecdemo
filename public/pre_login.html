<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="/css/shared.css"/>
  <link rel="stylesheet" href="/css/pre-login.css"/>
  <script src="/js/theme.js"></script>

<body>
  <canvas id="particles-canvas"></canvas>

  <button class="pre-theme-toggle" onclick="toggleTheme()" title="Toggle theme">
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun"  viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>

    <p class="subtitle">Válaszd ki a bejelentkezési módodat a folytatáshoz.</p>

    <div class="options-row">
      <a href="rfid-login.html" class="btn-option">
        <div class="btn-option-icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M16 12h.01"/><path d="M19 12h.01"/><path d="M6 12h6"/></svg>
        </div>
        <h3>RFID Login</h3>
        <p>Operátor / Gépkezelő</p>
      </a>
      <a href="login.html" class="btn-option">
        <div class="btn-option-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h3>User &amp; Pass</h3>
        <p>QA / Management</p>

    </div>
      

  <script src="/js/pre-login.js"></script>
