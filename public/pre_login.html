<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - Welcome ツ</title>
  <link rel="icon" type="image/png" href="https://images.guns.lol/1014ab9fad8d9224ff7788b82f63b02ae6fbce5d/2mHlsc.png"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/shared.css"/>
  <link rel="stylesheet" href="/css/pre-login.css"/>
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <div class="pre-login-card">
    <img src="https://images.guns.lol/1014ab9fad8d9224ff7788b82f63b02ae6fbce5d/6zYjti.png" alt="Logo" class="logo"/>
    <h1>Üdv!ツ</h1>
    <p class="subtitle">Válaszd ki a bejelentkezési módodat!</p>
    <div class="options-row">
      <a href="rfid-login.html" class="btn-option">
        <h3>RFID Login</h3>
        <p>Operátor / Gépkezelő</p>
      </a>
      <a href="login.html" class="btn-option">
        <h3>User &amp; Pass</h3>
        <p>QA / Management</p>
      </a>
    </div>
    <div class="demo-box">
      <div class="demo-box-title">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Demo bejelentkezési adatok
      </div>
      <div class="demo-grid">
        <div>
          <div class="demo-role-name">Management</div>
          <div class="demo-cred"><span>→</span> manager1</div>
          <div class="demo-cred"><span>→</span> manager2</div>
        </div>
        <div>
          <div class="demo-role-name">QA</div>
          <div class="demo-cred"><span>→</span> qa1</div>
          <div class="demo-cred"><span>→</span> qa2</div>
        </div>
        <div>
          <div class="demo-role-name">Operátor</div>
          <div class="demo-cred"><span>→</span> operator1</div>
          <div class="demo-cred"><span>→</span> operator2</div>
          <div class="demo-cred"><span>→</span> operator3</div>
        </div>
      </div>
      <div class="demo-pw">Minden jelszó: <code>demo123</code></div>
    </div>
  </div>
  <script src="/js/pre-login.js"></script>
</body>
</html>
