<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – RFID Sign In</title>
  <link rel="icon" type="image/png" href="https://images.guns.lol/1014ab9fad8d9224ff7788b82f63b02ae6fbce5d/2mHlsc.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/shared.css"/>
  <link rel="stylesheet" href="/css/rfid-login.css"/>
  <script src="/js/theme.js"></script>
</head>
<body>
  <div class="panel-left">
    <div class="panel-brand">
      <img src="https://images.guns.lol/1014ab9fad8d9224ff7788b82f63b02ae6fbce5d/6zYjti.png" alt="Logo" style="width:110px;height:auto;filter:brightness(0) invert(1);opacity:0.9;"/>
    </div>
    <div class="panel-tagline">
      <h2>Operator access made seamless.</h2>
      <p>Tap your RFID card and swipe to authenticate.</p>
    </div>
  </div>

  <div class="panel-right">
    <div class="login-card">
      <div class="login-theme-row">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun"  viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>

      <h1>RFID Sign In</h1>
      <p class="subtitle">Válaszd ki a kártyádat, majd húzd el a megerősítéshez</p>

      <div class="field">
        <label for="operatorSelect">Operátor kiválasztása (demo)</label>
        <select id="operatorSelect">
          <option value="">— Válassz operátort —</option>
          <option value="operator1">Horváth Béla (operator1)</option>
          <option value="operator2">Varga Zsolt (operator2)</option>
          <option value="operator3">Kiss Mónika (operator3)</option>
        </select>
      </div>

      <div class="rfid-zone">
        <button class="rfid-btn" id="rfidBtn" onclick="handleRFID()">
          <svg class="rfid-icon" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="18" width="40" height="26" rx="4"/>
            <rect x="15" y="25" width="10" height="8" rx="2"/>
            <path d="M34 31 Q37 31 37 28"/>
            <path d="M34 31 Q40 31 40 25"/>
            <path d="M34 31 Q43 31 43 22"/>
            <circle cx="34" cy="31" r="1.5" style="fill:currentColor;stroke:none;"/>
          </svg>
        </button>
        <p class="rfid-label">Tap to scan</p>
        <p class="rfid-status" id="rfidStatus">Ready</p>
      </div>

      <div class="swipe-wrap" id="swipeWrap" style="opacity:0.35;pointer-events:none;">
        <div class="swipe-track" id="swipeTrack">
          <div class="swipe-fill" id="swipeFill"></div>
          <div class="swipe-label">Swipe to verify →</div>
          <div class="swipe-success-label">✓ Verified</div>
          <div class="swipe-thumb" id="swipeThumb">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
      </div>

      <div class="divider">or</div>
      <a href="pre_login.html" class="back-link">← Back to <span>login selection</span></a>
    </div>
  </div>

  <script src="/api.js"></script>
  <script src="/js/rfid-login.js"></script>
</body>
</html>
