<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - RFID Login</title>
  <link rel="icon" type="image/png" href="https://images.guns.lol/1014ab9fad8d9224ff7788b82f63b02ae6fbce5d/2mHlsc.png"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/shared.css"/>
  <link rel="stylesheet" href="/css/rfid-login.css"/>
</head>
<body>
  <div class="panel-left">
    <div><img src="https://images.guns.lol/1014ab9fad8d9224ff7788b82f63b02ae6fbce5d/6zYjti.png" alt="Logo" style="width:120px;height:auto;"/></div>
    <div class="panel-tagline"><h2>Welcome back to your workspace.</h2></div>
  </div>

  <div class="panel-right">
    <div class="login-card">
      <h1>RFID Sign in</h1>
      <p class="subtitle">Válaszd ki a kártyádat, majd húzd el a megerősítéshez</p>

      <div class="field">
        <label for="operatorSelect">Operátor kiválasztása (demo)</label>
        <select id="operatorSelect">
          <option value="">— Válassz operátort —</option>
          <option value="operator1">Horváth Béla (operator1)</option>
          <option value="operator2">Varga Zsolt (operator2)</option>
          <option value="operator3">Kiss Mónika (operator3)</option>
        </select>
      </div>

      <div class="rfid-zone">
        <button class="rfid-btn" id="rfidBtn" onclick="handleRFID()">
          <svg width="52" height="52" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="18" width="40" height="26" rx="4"/>
            <rect x="15" y="25" width="10" height="8" rx="2"/>
            <path d="M34 31 Q37 31 37 28"/><path d="M34 31 Q40 31 40 25"/><path d="M34 31 Q43 31 43 22"/>
            <circle cx="34" cy="31" r="1.5" style="fill:var(--mid);stroke:none;"/>
          </svg>
        </button>
        <p class="rfid-label">Tap to scan</p>
        <p class="rfid-status" id="rfidStatus">Ready</p>
      </div>

      <div class="swipe-wrap" id="swipeWrap" style="opacity:0.3;pointer-events:none;">
        <div class="swipe-track" id="swipeTrack">
          <div class="swipe-fill" id="swipeFill"></div>
          <div class="swipe-label">Swipe to verify →</div>
          <div class="swipe-success-label">✓ Verified</div>
          <div class="swipe-thumb" id="swipeThumb">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
      </div>

      <div class="divider">or</div>
      <a href="pre_login.html" class="back-link">Go back to <span>login selection</span></a>
    </div>
  </div>

  <script src="/api.js"></script>
  <script src="/js/rfid-login.js"></script>
</body>
</html>
