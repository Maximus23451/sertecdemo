<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Gépkezelő</title>
  <link rel="icon" type="image/png" href="https://images.guns.lol/1014ab9fad8d9224ff7788b82f63b02ae6fbce5d/2mHlsc.png"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #93C840;
      --green-dim: rgba(147,200,64,0.1);
      --green-line: rgba(147,200,64,0.2);
      --bg: #000;
      --surface: #0a0a0a;
      --surface2: #111;
      --border: #1a1a1a;
      --border2: #222;
      --muted: #4a4a4a;
      --sub: #888;
      --text: #d0d0d0;
      --red: #b84040;
      --red-dim: rgba(184,64,64,0.08);
      --red-line: rgba(184,64,64,0.2);
    }
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    /* topbar */
    .topbar { height: 48px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .tb-left { display: flex; align-items: center; gap: 10px; }
    .tb-left img { height: 20px; }
    .tb-name { font-size: 0.82rem; font-weight: 600; color: var(--text); }
    .tb-right { display: flex; align-items: center; gap: 10px; }
    .tb-clock { font-size: 0.78rem; color: var(--muted); font-variant-numeric: tabular-nums; }
    .btn-logout { font-size: 0.72rem; color: var(--muted); background: none; border: 1px solid var(--border2); padding: 4px 10px; border-radius: 3px; cursor: pointer; font-family: inherit; transition: color 0.1s; }
    .btn-logout:hover { color: var(--red); border-color: var(--red-line); }

    /* scroll area */
    .scroll-body { flex: 1; overflow-y: auto; }

    /* bottom nav */
    .bottom-nav {
      height: 60px; flex-shrink: 0;
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .bnav-btn {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px;
      border: none; background: none; cursor: pointer; font-family: inherit;
      color: var(--muted); position: relative;
      transition: color 0.1s;
    }
    .bnav-btn.active { color: var(--green); }
    .bnav-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .bnav-label { font-size: 0.65rem; font-weight: 500; }
    .bnav-dot {
      position: absolute; top: 10px; right: calc(50% - 14px);
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red); border: 1px solid var(--bg);
      display: none;
    }
    .bnav-dot.show { display: block; }

    /* tab content */
    .tab-content { display: none; padding: 16px; min-height: 100%; }
    .tab-content.active { display: block; }

    /* question card */
    .q-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      padding: 16px; margin-bottom: 12px;
    }
    .q-card.pending-card { border-color: var(--green-line); }

    .q-card-label { font-size: 0.68rem; font-weight: 600; color: var(--green); margin-bottom: 8px; }
    .q-card-text { font-size: 1rem; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 16px; }

    .answer-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-yes, .btn-no {
      padding: 14px;
      border-radius: 4px; border: 1px solid; cursor: pointer;
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      transition: opacity 0.1s;
    }
    .btn-yes { background: var(--green-dim); border-color: var(--green-line); color: var(--green); }
    .btn-yes:hover { opacity: 0.75; }
    .btn-no  { background: var(--red-dim); border-color: var(--red-line); color: var(--red); }
    .btn-no:hover { opacity: 0.75; }
    .btn-yes:disabled, .btn-no:disabled { opacity: 0.3; cursor: not-allowed; }

    .reason-area {
      margin-top: 12px; display: none;
    }
    .reason-area.show { display: block; }
    textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); font-family: inherit; font-size: 0.85rem;
      padding: 9px 11px; border-radius: 4px; outline: none; resize: vertical;
      min-height: 72px; transition: border-color 0.1s;
    }
    textarea:focus { border-color: var(--green); }
    textarea::placeholder { color: var(--muted); }
    .btn-submit {
      width: 100%; margin-top: 8px; padding: 11px;
      background: var(--green); color: #000;
      font-family: inherit; font-size: 0.88rem; font-weight: 600;
      border: none; border-radius: 4px; cursor: pointer;
      transition: opacity 0.1s;
    }
    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }

    /* answered state */
    .answered-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      padding: 16px; text-align: center;
    }
    .answered-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .answered-text { font-size: 0.82rem; color: var(--sub); }

    /* no pending */
    .no-pending { padding: 40px 16px; text-align: center; }
    .no-pending-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.3; }
    .no-pending-text { font-size: 0.82rem; color: var(--muted); }

    /* history */
    .hist-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .hist-item:last-child { border-bottom: none; }
    .hist-top { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 3px; }
    .hist-q { flex: 1; font-size: 0.82rem; color: var(--text); line-height: 1.4; }
    .badge { font-size: 0.66rem; font-weight: 600; padding: 1px 6px; border-radius: 3px; border: 1px solid; flex-shrink: 0; }
    .badge-yes { color: var(--green); border-color: var(--green-line); background: var(--green-dim); }
    .badge-no  { color: var(--red); border-color: var(--red-line); background: var(--red-dim); }
    .hist-meta { font-size: 0.7rem; color: var(--muted); }
    .hist-reason { font-size: 0.73rem; color: var(--muted); font-style: italic; margin-top: 4px; }

    /* docs */
    .doc-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .doc-item:last-child { border-bottom: none; }
    .doc-icon { width: 32px; height: 32px; border-radius: 4px; background: var(--red-dim); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .doc-icon svg { width: 14px; height: 14px; stroke: var(--red); fill: none; stroke-width: 2; }
    .doc-body { flex: 1; min-width: 0; }
    .doc-name { font-size: 0.85rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .btn-view { font-size: 0.73rem; font-weight: 500; padding: 5px 12px; border-radius: 3px; cursor: pointer; font-family: inherit; color: var(--green); border: 1px solid var(--green-line); background: var(--green-dim); transition: opacity 0.1s; }
    .btn-view:hover { opacity: 0.75; }

    .empty { font-size: 0.8rem; color: var(--muted); padding: 32px 0; text-align: center; }

    /* PDF modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal { width: 100%; height: 90vh; background: var(--surface); border-top: 1px solid var(--border2); border-radius: 6px 6px 0 0; display: flex; flex-direction: column; overflow: hidden; }
    .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .modal-head-title { font-size: 0.85rem; color: var(--sub); }
    .modal-close { width: 28px; height: 28px; border: 1px solid var(--border2); background: var(--surface2); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-close svg { stroke: var(--muted); width: 12px; height: 12px; fill: none; stroke-width: 2; }
    .modal iframe { width: 100%; border: none; flex: 1; display: block; }

    ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <img src="https://images.guns.lol/1014ab9fad8d9224ff7788b82f63b02ae6fbce5d/6zYjti.png" alt=""/>
    <span class="tb-name" id="tbName"></span>
  </div>
  <div class="tb-right">
    <span class="tb-clock" id="tbClock"></span>
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="scroll-body">
  <!-- QA tab -->
  <div id="tab-qa" class="tab-content active">
    <div id="noPending" class="no-pending">
      <div class="no-pending-icon">◎</div>
      <div class="no-pending-text">No active question</div>
    </div>
    <div id="pendingCard" style="display:none;">
      <div class="q-card pending-card">
        <div class="q-card-label">QA kérdés</div>
        <div class="q-card-text" id="pendingText"></div>
        <div class="answer-row">
          <button class="btn-yes" id="btnYes" onclick="answer('yes')">Igen</button>
          <button class="btn-no"  id="btnNo"  onclick="showReason()">Nem</button>
        </div>
        <div class="reason-area" id="reasonArea">
          <textarea id="reasonTxt" placeholder="Indoklás (kötelező)…"></textarea>
          <button class="btn-submit" id="btnSubmitNo" onclick="answer('no')">Beküld</button>
        </div>
      </div>
    </div>
    <div id="answeredCard" style="display:none;">
      <div class="answered-card">
        <div class="answered-icon">✓</div>
        <div class="answered-text">Megválaszolva — várakozás a következő kérdésre</div>
      </div>
    </div>
  </div>

  <!-- History tab -->
  <div id="tab-history" class="tab-content">
    <div id="histList"><div class="empty">Nincs előzmény</div></div>
  </div>

  <!-- Documents tab -->
  <div id="tab-docs" class="tab-content">
    <div id="docList"><div class="empty">Nincs feltöltött dokumentum</div></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="bnav-btn active" id="bnav-qa" onclick="switchTab('qa')">
    <div class="bnav-dot" id="qa-dot"></div>
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span class="bnav-label">QA Kérdés</span>
  </button>
  <button class="bnav-btn" id="bnav-history" onclick="switchTab('history')">
    <svg viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4M3 3v4h4"/></svg>
    <span class="bnav-label">Előzmények</span>
  </button>
  <button class="bnav-btn" id="bnav-docs" onclick="switchTab('docs')">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span class="bnav-label">Dokumentumok</span>
  </button>
</nav>

<div class="overlay" id="pdfOverlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-head-title" id="modalName"></span>
      <button class="modal-close" onclick="closePDF()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <iframe id="pdfFrame" src=""></iframe>
  </div>
</div>

<script src="/api.js"></script>
<script>
  const user = API.requireRole(['operator']);
  if (user) document.getElementById('tbName').textContent = user.displayName;
  const doLogout = () => { API.clearUser(); location.href='/pre_login.html'; };
  setInterval(() => document.getElementById('tbClock').textContent = new Date().toLocaleTimeString('hu-HU'), 1000);
  document.getElementById('tbClock').textContent = new Date().toLocaleTimeString('hu-HU');

  let docs=[], history=[], pending=null, answeredId=null;
  try { answeredId = sessionStorage.getItem('answeredPendingId'); } catch(e) {}

  function switchTab(name) {
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
    document.getElementById('bnav-'+name).classList.add('active');
    if (name==='qa') document.getElementById('qa-dot').classList.remove('show');
  }

  API.subscribe({
    init:    d => { docs=d.docs; pending=d.pending; renderDocs(); renderPending(); },
    docs:    d => { docs=d; renderDocs(); },
    pending: d => {
      const wasNew = d && (!pending || d.id !== pending.id);
      pending=d;
      renderPending();
      if (wasNew && d) {
        document.getElementById('qa-dot').classList.add('show');
        answeredId=null; try { sessionStorage.removeItem('answeredPendingId'); } catch(e) {}
      }
    },
  });

  function renderPending() {
    const no  = document.getElementById('noPending');
    const pc  = document.getElementById('pendingCard');
    const ac  = document.getElementById('answeredCard');
    if (!pending) { no.style.display=''; pc.style.display='none'; ac.style.display='none'; return; }
    if (answeredId === pending.id) { no.style.display='none'; pc.style.display='none'; ac.style.display=''; return; }
    document.getElementById('pendingText').textContent = pending.text;
    no.style.display='none'; pc.style.display=''; ac.style.display='none';
    document.getElementById('btnYes').disabled=false;
    document.getElementById('btnNo').disabled=false;
    document.getElementById('btnSubmitNo').disabled=false;
    document.getElementById('reasonArea').className='reason-area';
    document.getElementById('reasonTxt').value='';
  }

  function showReason() {
    document.getElementById('reasonArea').className='reason-area show';
    document.getElementById('reasonTxt').focus();
  }

  async function answer(ans) {
    if (!pending) return;
    if (ans==='no') {
      const reason = document.getElementById('reasonTxt').value.trim();
      if (!reason) { document.getElementById('reasonTxt').focus(); return; }
      document.getElementById('btnSubmitNo').disabled=true;
      await API.addResponse(pending.id, pending.text, 'no', reason, user.displayName||user.username);
    } else {
      document.getElementById('btnYes').disabled=true;
      document.getElementById('btnNo').disabled=true;
      await API.addResponse(pending.id, pending.text, 'yes', '', user.displayName||user.username);
    }
    answeredId = pending.id;
    try { sessionStorage.setItem('answeredPendingId', answeredId); } catch(e) {}
    history.unshift({ question: pending.text, answer: ans, reason: ans==='no'?document.getElementById('reasonTxt').value.trim():'', time: new Date().toLocaleTimeString('hu-HU') });
    renderHistory();
    renderPending();
  }

  function renderHistory() {
    document.getElementById('histList').innerHTML = history.length
      ? history.map(h=>`
        <div class="hist-item">
          <div class="hist-top"><div class="hist-q">${API.escHtml(h.question)}</div><span class="badge badge-${h.answer}">${h.answer==='yes'?'Igen':'Nem'}</span></div>
          <div class="hist-meta">${h.time}</div>
          ${h.reason?`<div class="hist-reason">${API.escHtml(h.reason)}</div>`:''}
        </div>`).join('')
      : '<div class="empty">Nincs előzmény</div>';
  }

  function renderDocs() {
    document.getElementById('docList').innerHTML = docs.length
      ? docs.map(d=>`
        <div class="doc-item">
          <div class="doc-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
          <div class="doc-body"><div class="doc-name">${API.escHtml(d.name)}</div><div class="doc-meta">${d.size} · ${d.uploadedAt}</div></div>
          <button class="btn-view" onclick="openPDF('${d.id}','${API.escHtml(d.name)}')">Megtekint</button>
        </div>`).join('')
      : '<div class="empty">Nincs feltöltött dokumentum</div>';
  }

  async function openPDF(id, name) {
    const doc = await API.getDocData(id);
    document.getElementById('modalName').textContent = name;
    document.getElementById('pdfFrame').src = doc.data + '#toolbar=0&navpanes=0';
    document.getElementById('pdfOverlay').classList.add('open');
  }
  function closePDF() { document.getElementById('pdfOverlay').classList.remove('open'); document.getElementById('pdfFrame').src=''; }
</script>
</body>
</html>
